<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NovaCart Signup</title>

  <!-- CSS -->

  <link rel="stylesheet" href="login.css">

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <!-- ========================= -->
  <!-- AUTH PAGE -->
  <!-- ========================= -->

  <section class="auth-page signup-page">

    <!-- Animated Background -->

    <div class="auth-grid"></div>

    <!-- Glow Orbs -->

    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>

    <!-- Floating Rings -->

    <div class="auth-ring ring-1"></div>
    <div class="auth-ring ring-2"></div>

    <!-- Floating Product -->

    <div class="floating-product">

      <div class="product-glow"></div>

      <img src="assets/images/product6.png" alt="">

    </div>

    <!-- AUTH CARD -->

    <div class="auth-card">

      <!-- TOP -->

      <div class="auth-top">

        <!-- Logo -->

        <div class="auth-logo">

          <div class="logo-icon">

            <i class="fa-solid fa-bag-shopping"></i>

          </div>

          <h2>Stackly Cart</h2>

        </div>

        <!-- Tag -->

        <span class="auth-tag">

          JOIN THE FUTURE

        </span>

        <!-- Heading -->

        <h1>

          Create Your
          <span>Account</span>

        </h1>

        <p>

          Become part of the premium futuristic
          shopping experience.

        </p>

      </div>

      <!-- FORM -->

      <form class="auth-form">

        <!-- FULL NAME -->

        <div class="input-group">

          <label>Full Name</label>

          <div class="input-box">

            <i class="fa-regular fa-user"></i>

            <input
              type="text"
              placeholder="Enter your full name"
            >

          </div>

        </div>

        <!-- EMAIL -->

        <div class="input-group">

          <label>Email Address</label>

          <div class="input-box">

            <i class="fa-regular fa-envelope"></i>

            <input
              type="email"
              placeholder="Enter your email"
            >

          </div>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

          <label>Password</label>

          <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
                type="password"
                id="password"
                placeholder="Create password"
                >

            <i class="fa-regular fa-eye toggle-password"></i>

          </div>

        </div>

        <!-- CONFIRM PASSWORD -->

        <div class="input-group">

          <label>Confirm Password</label>

          <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
                >

            <i class="fa-regular fa-eye toggle-password"></i>

          </div>
          <p class="match-message" id="matchMessage"></p>

        </div>

        <!-- PASSWORD STRENGTH -->

        <div class="password-strength">

            <div class="strength-bars">

                <span class="strength-bar"></span>
                <span class="strength-bar"></span>
                <span class="strength-bar"></span>

            </div>

            <p id="strength-text">
                Password Strength
            </p>

        </div>

        <!-- TERMS -->

        <div class="terms-box">

          <input
            type="checkbox"
            id="termsCheck"
            >

          <span>

            I agree to the
            <a href="#">Terms & Conditions</a>

          </span>

        </div>

        <!-- BUTTON -->

        <button class="auth-btn">

          Create Account

          <i class="fa-solid fa-arrow-right"></i>

        </button>

      </form>

      <!-- Divider -->

      <div class="auth-divider">

        <span>OR SIGNUP WITH</span>

      </div>

      <!-- Social Login -->

      <div class="social-login">

        <button>

          <i class="fa-brands fa-google"></i>

          Google

        </button>

        <button>

          <i class="fa-brands fa-apple"></i>

          Apple

        </button>

      </div>

      <!-- Bottom -->

      <div class="auth-bottom">

        <p>

          Already have an account?

          <a href="login.html">

            Login Now

          </a>

        </p>

      </div>

    </div>

  </section>
<script src="auth.js"></script>
</body>

</html>
