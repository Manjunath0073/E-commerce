<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>404 | Stackly Cart</title>

  <!-- CSS -->

  <link rel="stylesheet" href="404.css">

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <!-- GOOGLE FONT -->

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- ========================= -->
  <!-- 404 PAGE -->
  <!-- ========================= -->

  <section class="error-page">

    <!-- Background Grid -->

    <div class="error-grid"></div>

    <!-- Glow -->

    <div class="error-glow glow-1"></div>
    <div class="error-glow glow-2"></div>

    <!-- Floating Orbs -->

    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <!-- Main Content -->

    <div class="error-wrapper">

      <!-- Left -->

      <div class="error-content">

        <span>ERROR 404</span>

        <h1>

          Lost In The
          <span>Future</span>

        </h1>

        <p>

          The page you're looking for
          doesn’t exist or has been moved
          into another futuristic dimension.

        </p>

        <!-- Buttons -->

        <div class="error-buttons">

          <a href="index.html" class="primary-btn">

            Back To Home

            <i class="fa-solid fa-arrow-right"></i>

          </a>

          <a href="shop.html" class="secondary-btn">

            Explore Shop

          </a>

        </div>

      </div>

      <!-- Right -->

      <div class="error-visual">

        <!-- Rings -->

        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>

        <!-- Glow -->

        <div class="visual-glow"></div>

        <!-- Error Number -->

        <h2>404</h2>

        <!-- Floating Card -->

        <div class="floating-card">

          <i class="fa-solid fa-triangle-exclamation"></i>

          <span>Page Not Found</span>

        </div>

      </div>

    </div>

  </section>

</body>

</html>
