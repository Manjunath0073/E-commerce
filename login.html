<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Stackly Cart Login</title>

  <!-- CSS -->

  <link rel="stylesheet" href="login.css">

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <!-- ========================= -->
  <!-- AUTH PAGE -->
  <!-- ========================= -->

  <section class="auth-page">

    <!-- Animated Background -->

    <div class="auth-grid"></div>

    <!-- Glow Orbs -->

    <div class="auth-orb orb-1"></div>
    <div class="auth-orb orb-2"></div>
    <div class="auth-orb orb-3"></div>

    <!-- Floating Ring -->

    <div class="auth-ring ring-1"></div>
    <div class="auth-ring ring-2"></div>

    <!-- Floating Product -->

    <div class="floating-product">

      <div class="product-glow"></div>

      <img src="assets/images/product4.png" alt="">

    </div>

    <!-- AUTH CARD -->

    <div class="auth-card">

      <!-- Top -->

      <div class="auth-top">

        <!-- Logo -->

        <div class="auth-logo">

          <div class="logo-icon">

            <i class="fa-solid fa-bag-shopping"></i>

          </div>

          <h2>Stackly Cart</h2>

        </div>

        <!-- Small Tag -->

        <span class="auth-tag">

          FUTURE SHOPPING EXPERIENCE

        </span>

        <!-- Heading -->

        <h1>

          Enter The
          <span>Future</span>

        </h1>

        <p>

          Access your premium futuristic
          shopping experience.

        </p>

      </div>

      <!-- FORM -->

      <form class="auth-form">

        <!-- EMAIL -->

        <div class="input-group">

          <label>Email Address</label>

          <div class="input-box">

            <i class="fa-regular fa-envelope"></i>

            <input
              type="email"
              placeholder="Enter your email"
            >

          </div>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

          <label>Password</label>

          <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
              type="password"
              placeholder="Enter your password"
            >

            <i class="fa-regular fa-eye toggle-password"></i>

          </div>

        </div>

        <!-- OPTIONS -->

        <div class="auth-options">

          <div class="remember-box">

            <input type="checkbox">

            <span>Remember Me</span>

          </div>

          <a href="#">
            Forgot Password?
          </a>

        </div>

        <!-- BUTTON -->

        <button class="auth-btn">

          Login Now

          <i class="fa-solid fa-arrow-right"></i>

        </button>

      </form>

      <!-- Divider -->

      <div class="auth-divider">

        <span>OR CONTINUE WITH</span>

      </div>

      <!-- Social Login -->

      <div class="social-login">

        <button>

          <i class="fa-brands fa-google"></i>

          Google

        </button>

        <button>

          <i class="fa-brands fa-apple"></i>

          Apple

        </button>

      </div>

      <!-- Bottom -->

      <div class="auth-bottom">

        <p>

          Don’t have an account?

          <a href="signup.html">

            Create Account

          </a>

        </p>

      </div>

    </div>

  </section>

</body>

</html>
